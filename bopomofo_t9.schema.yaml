schema:
  schema_id: bopomofo_t9
  name: 注音九宮格(自訂)
  version: "6.0"

engine:
  processors:
    - ascii_composer
    - speller
    - recognizer
    - key_binder
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier

speller:
  # T9數字鍵 + 聲調鍵 + 所有聲母精確碼(ASCII字母)
  # 精確碼: b(ㄅ) d(ㄉ) g(ㄍ) j(ㄐ) Z(ㄓ) z(ㄗ) p(ㄆ) t(ㄊ) k(ㄎ) q(ㄑ)
  #         C(ㄔ) c(ㄘ) m(ㄇ) n(ㄋ) h(ㄏ) x(ㄒ) S(ㄕ) s(ㄙ) f(ㄈ) l(ㄌ) r(ㄖ)
  alphabet: "1234567890vwyqpbdgjZzptkkCcmnhxSsflr"
  initials: "1234567890vwyqpbdgjZzptkkCcmnhxSsflr"
  use_space: false
  delimiter: " '"
  algebra:
    - xform/^r5$/er5/

    # 聲調預處理
    - xform/1$//
    - xform/2$/W/
    - xform/3$/Y/
    - xform/4$/Q/
    - xform/5$/P/

    # 介母
    - xform/^yu/v/
    - xform/^yi?/i/
    - xform/^wu?/u/

    # 拼音修正
    - xform/iu/iou/
    - xform/ui/uei/
    - xform/ong/ung/
    - xform/ing/iG/
    - xform/ung/uG/
    - xform/iu/v/
    - xform/^([jqx])u/$1v/
    - xform/([iuv])n/$1en/

    # 聲母特殊處理(保留大寫作為精確碼)
    - xform/^zhi?/Z/
    - xform/^chi?/C/
    - xform/^shi?/S/
    - xform/^([zcsr])i/$1/

    # 韻母代號化
    - xform/ai/A/
    - xform/ei/I/
    - xform/ao/O/
    - xform/ou/U/
    - xform/ang/K/
    - xform/eng/G/
    - xform/an/M/
    - xform/en/N/
    - xform/er/R/
    - xform/eh/E/
    - xform/([iv])e/$1E/

    # === 韻母/介母 → 數字 (聲母保留字母作為精確碼) ===
    - xform/a/1/
    - xform/A/2/
    - xform/[MR]/3/
    - xform/o/4/
    - xform/I/5/
    - xform/[Ni]/6/
    - xform/e/7/
    - xform/[OU]/8/
    - xform/[Ku]/9/
    - xform/E/0/
    - xform/[Gv]/v/

    # 聲調字母
    - xform/W/w/
    - xform/Y/y/
    - xform/Q/q/
    - xform/P/p/

    # 允許省略聲調
    - derive/[wyqp]$//

    # === 聲母精確碼 → T9 模糊碼 (放最後，派生不再被 xform 處理) ===
    - derive/^b/1/
    - derive/^d/1/
    - derive/^g/2/
    - derive/^j/2/
    - derive/^Z/3/
    - derive/^z/3/
    - derive/^p/4/
    - derive/^t/4/
    - derive/^k/5/
    - derive/^q/5/
    - derive/^C/6/
    - derive/^c/6/
    - derive/^m/7/
    - derive/^n/7/
    - derive/^h/8/
    - derive/^x/8/
    - derive/^S/9/
    - derive/^s/9/
    - derive/^f/0/
    - derive/^l/0/
    - derive/^r/v/

    # 簡拼
    - derive/^(.).+$/$1/
    - derive/^(.).+([wyqp])$/$1$2/

translator:
  dictionary: terra_pinyin
  prism: bopomofo_t9_custom

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    abc: "^[1234567890vwyqpbdgjZzptCcmnhxSsflr]+$"