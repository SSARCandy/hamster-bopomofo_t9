keyboardBackgroundStyle:
  type: original
  normalColor: "2B2B2B"

toolbarBackgroundStyle:
  type: original
  normalColor: "2B2B2B"

toolbarHorizontalCandidateStyle:
  candidateStyle:
    textColor: "FFFFFF"
    fontSize: 16
    fontWeight: medium
    center: { y: 0.5 }
  preeditStyle:
    textColor: "FFFFFF"
    fontSize: 13
    center: { y: 0.5 }

alphabeticBackgroundStyle:
  type: original
  insets: { top: 6, left: 3, bottom: 6, right: 3 }
  normalColor: "6A6A6A"
  highlightColor: "404040"
  cornerRadius: 5
  normalLowerEdgeColor: "2A2A2A"
  highlightLowerEdgeColor: "2A2A2A"

functionalBackgroundStyle:
  type: original
  insets: { top: 6, left: 3, bottom: 6, right: 3 }
  normalColor: "404040"
  highlightColor: "6A6A6A"
  cornerRadius: 5
  normalLowerEdgeColor: "2A2A2A"
  highlightLowerEdgeColor: "2A2A2A"

enterBackgroundStyle:
  type: original
  insets: { top: 6, left: 3, bottom: 6, right: 3 }
  normalColor: "007AFF"
  highlightColor: "005BB5"
  cornerRadius: 5
  normalLowerEdgeColor: "004080"
  highlightLowerEdgeColor: "004080"

spaceBackgroundStyle:
  type: original
  insets: { top: 6, left: 3, bottom: 6, right: 3 }
  normalColor: "6A6A6A"
  highlightColor: "404040"
  cornerRadius: 5
  normalLowerEdgeColor: "2A2A2A"
  highlightLowerEdgeColor: "2A2A2A"

# Keyboard Layout
keyboardLayout:
  - HStack:
      subviews:
        - Cell: wButton
        - Cell: key1Button
        - Cell: key2Button
        - Cell: key3Button
        - Cell: eButton
  - HStack:
      subviews:
        - Cell: yButton
        - Cell: key4Button
        - Cell: key5Button
        - Cell: key6Button
        - Cell: numKeyboardButton
  - HStack:
      subviews:
        - Cell: qButton
        - Cell: key7Button
        - Cell: key8Button
        - Cell: key9Button
        - Cell: deleteButton
  - HStack:
      subviews:
        - Cell: pButton
        - Cell: key0Button
        - Cell: spaceButton
        - Cell: keyVButton
        - Cell: enterButton

# Button Keys
wButton:
  size: { width: { percentage: 0.16 } }
  backgroundStyle: functionalBackgroundStyle
  foregroundStyle: wButtonForegroundStyle
  action: { character: w }

key1Button:
  size: { width: { percentage: 0.2266 } }
  backgroundStyle: alphabeticBackgroundStyle
  foregroundStyle: key1ButtonForegroundStyle
  action: { character: 1 }
  callout:
    - { label: "ㄅ", action: { character: b } }
    - { label: "ㄉ", action: { character: d } }
    - { label: "ㄚ", action: { character: 1 } }

key2Button:
  size: { width: { percentage: 0.2268 } }
  backgroundStyle: alphabeticBackgroundStyle
  foregroundStyle: key2ButtonForegroundStyle
  action: { character: 2 }
  callout:
    - { label: "ㄍ", action: { character: g } }
    - { label: "ㄐ", action: { character: j } }
    - { label: "ㄞ", action: { character: 2 } }

key3Button:
  size: { width: { percentage: 0.2266 } }
  backgroundStyle: alphabeticBackgroundStyle
  foregroundStyle: key3ButtonForegroundStyle
  action: { character: 3 }
  callout: # Reversed order for Right Column
    - { label: "ㄦ", action: { character: 3 } }
    - { label: "ㄢ", action: { character: 3 } }
    - { label: "ㄗ", action: { character: z } }
    - { label: "ㄓ", action: { character: Z } }

eButton:
  size: { width: { percentage: 0.16 } }
  backgroundStyle: functionalBackgroundStyle
  foregroundStyle: eButtonForegroundStyle
  action: { character: e }

yButton:
  size: { width: { percentage: 0.16 } }
  backgroundStyle: functionalBackgroundStyle
  foregroundStyle: yButtonForegroundStyle
  action: { character: y }

key4Button:
  size: { width: { percentage: 0.2266 } }
  backgroundStyle: alphabeticBackgroundStyle
  foregroundStyle: key4ButtonForegroundStyle
  action: { character: 4 }
  callout:
    - { label: "ㄆ", action: { character: p } }
    - { label: "ㄊ", action: { character: t } }
