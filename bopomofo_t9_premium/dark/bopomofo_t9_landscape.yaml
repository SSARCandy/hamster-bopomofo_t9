keyboardHeight: 150
toolbarHeight: 38
preeditHeight: 20

keyboardStyle:
  backgroundStyle: keyboardBackgroundStyle

toolbar:
  backgroundStyle: toolbarBackgroundStyle
  horizontalCandidateStyle: toolbarHorizontalCandidateStyle

