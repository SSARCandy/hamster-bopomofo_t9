keyboardHeight: 250
toolbarHeight: 44
preeditHeight: 25

keyboardStyle:
  backgroundStyle: keyboardBackgroundStyle

toolbar:
  backgroundStyle: toolbarBackgroundStyle
  horizontalCandidateStyle: toolbarHorizontalCandidateStyle

# Styles

numAddButtonForegroundStyle:
  textColor: "FFFFFF"
  text: "+"
  fontSize: 20
  fontWeight: regular
  center: { y: 0.5 }

numEqualButtonForegroundStyle:
