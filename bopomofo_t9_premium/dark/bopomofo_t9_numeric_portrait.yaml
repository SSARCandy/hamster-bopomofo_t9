  center: { y: 0.5 }

num4ButtonForegroundStyle:
  textColor: "FFFFFF"
  text: "4"
  fontSize: 18
  fontWeight: regular
  center: { y: 0.5 }

num5ButtonForegroundStyle:
  textColor: "FFFFFF"
  text: "5"
