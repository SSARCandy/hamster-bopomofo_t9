  center: { y: 0.5 }
keyboardBackgroundStyle:
  type: original
  normalColor: "2B2B2B"

toolbarBackgroundStyle:
  type: original
  normalColor: "2B2B2B"

toolbarHorizontalCandidateStyle:
  candidateStyle:
    textColor: "FFFFFF"
    fontSize: 18
    fontWeight: medium
    center: { y: 0.5 }
  preeditStyle:
    textColor: "FFFFFF"
    fontSize: 14
    center: { y: 0.5 }

alphabeticBackgroundStyle:
  type: original
  insets: { top: 6, left: 3, bottom: 6, right: 3 }
  normalColor: "6A6A6A"
  highlightColor: "404040"
  cornerRadius: 5
  normalLowerEdgeColor: "2A2A2A"
  highlightLowerEdgeColor: "2A2A2A"

functionalBackgroundStyle:
  type: original
  insets: { top: 6, left: 3, bottom: 6, right: 3 }
  normalColor: "404040"
  highlightColor: "6A6A6A"
  cornerRadius: 5
  normalLowerEdgeColor: "2A2A2A"
  highlightLowerEdgeColor: "2A2A2A"

enterBackgroundStyle:
  type: original
  insets: { top: 6, left: 3, bottom: 6, right: 3 }
  normalColor: "007AFF"
  highlightColor: "005BB5"
  cornerRadius: 5
  normalLowerEdgeColor: "004080"
  highlightLowerEdgeColor: "004080"

# Keyboard Layout
keyboardLayout:
  - HStack:
      subviews:
        - Cell: numAddButton
        - Cell: num1Button
        - Cell: num2Button
        - Cell: num3Button
        - Cell: numEqualButton
  - HStack:
      subviews:
        - Cell: numSubButton
        - Cell: num4Button
        - Cell: num5Button
        - Cell: num6Button
        - Cell: numSwitchButton
  - HStack:
      subviews:
        - Cell: numMulButton
        - Cell: num7Button
        - Cell: num8Button
        - Cell: num9Button
        - Cell: deleteButton
  - HStack:
      subviews:
        - Cell: numDivButton
        - Cell: numCommaButton
        - Cell: num0Button
        - Cell: numDotButton
        - Cell: enterButton

# Button Keys
numAddButton:
  size: { width: { percentage: 0.16 } }
  backgroundStyle: functionalBackgroundStyle
  foregroundStyle: numAddButtonForegroundStyle
  action: { symbol: "+" }

numEqualButton:
  size: { width: { percentage: 0.16 } }
  backgroundStyle: functionalBackgroundStyle
  foregroundStyle: numEqualButtonForegroundStyle
  action: { symbol: "=" }

numSubButton:
  size: { width: { percentage: 0.16 } }
  backgroundStyle: functionalBackgroundStyle
  foregroundStyle: numSubButtonForegroundStyle
  action: { symbol: "-" }

numSwitchButton:
  size: { width: { percentage: 0.16 } }
  backgroundStyle: functionalBackgroundStyle
  foregroundStyle: numSwitchButtonForegroundStyle
  action: { keyboardType: pinyin }

numMulButton:
  size: { width: { percentage: 0.16 } }
  backgroundStyle: functionalBackgroundStyle
  foregroundStyle: numMulButtonForegroundStyle
  action: { symbol: "*" }

numDivButton:
  size: { width: { percentage: 0.16 } }
  backgroundStyle: functionalBackgroundStyle
  foregroundStyle: numDivButtonForegroundStyle
  action: { symbol: "/" }

numCommaButton:
  size: { width: { percentage: 0.2266 } }
  backgroundStyle: alphabeticBackgroundStyle
  foregroundStyle: numCommaButtonForegroundStyle
  action: { symbol: "," }

numDotButton:
  size: { width: { percentage: 0.2266 } }
